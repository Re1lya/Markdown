apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-repo
  namespace: platform-system
  labels:
    app.kubernetes.io/name: helm-repo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helm-repo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helm-repo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: repo-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: repo-content
          configMap:
            name: helm-repo-content
---
apiVersion: v1
kind: Service
metadata:
  name: helm-repo
  namespace: platform-system
  labels:
    app.kubernetes.io/name: helm-repo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helm-repo
  ports:
    - name: http
      port: 80
      targetPort: http

