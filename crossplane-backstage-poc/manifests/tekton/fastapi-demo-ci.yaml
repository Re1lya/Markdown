apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastapi-demo-ci
  namespace: ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fastapi-demo-ci-triggers
  namespace: ci
subjects:
  - kind: ServiceAccount
    name: fastapi-demo-ci
    namespace: ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tekton-triggers-github
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fastapi-demo-ci-triggers
subjects:
  - kind: ServiceAccount
    name: fastapi-demo-ci
    namespace: ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-github-ci
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: clone-repo
  namespace: ci
spec:
  params:
    - name: repo_url
      type: string
    - name: git_ref
      type: string
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:2.47.2
      workingDir: $(workspaces.source.path)
      env:
        - name: GIT_USERNAME
          valueFrom:
            secretKeyRef:
              name: github-git-auth
              key: username
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-git-auth
              key: token
      script: |
        #!/bin/sh
        set -eu
        cat > /tmp/git-askpass.sh <<'EOF'
        #!/bin/sh
        case "$1" in
          *Username*) echo "$GIT_USERNAME" ;;
          *) echo "$GIT_TOKEN" ;;
        esac
        EOF
        chmod +x /tmp/git-askpass.sh
        export GIT_ASKPASS=/tmp/git-askpass.sh
        export GIT_TERMINAL_PROMPT=0
        rm -rf repo
        git clone "$(params.repo_url)" repo
        cd repo
        git checkout "$(params.git_ref)"
        git rev-parse HEAD
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: test-fastapi-demo
  namespace: ci
spec:
  params:
    - name: context_dir
      type: string
  workspaces:
    - name: source
  steps:
    - name: pytest
      image: public.ecr.aws/docker/library/python:3.12-slim
      workingDir: $(workspaces.source.path)/repo/$(params.context_dir)
      script: |
        #!/bin/sh
        set -eu
        python -m pip install --no-cache-dir -r requirements-dev.txt
        python -m pytest -q
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-fastapi-demo
  namespace: ci
spec:
  params:
    - name: image
      type: string
    - name: context_dir
      type: string
  workspaces:
    - name: source
    - name: dockerconfig
  steps:
    - name: build-and-push
      image: moby/buildkit:rootless
      workingDir: $(workspaces.source.path)/repo
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.dockerconfig.path)
        - name: BUILDKITD_FLAGS
          value: --oci-worker-no-process-sandbox
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      script: |
        #!/bin/sh
        set -eu
        buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context="$(workspaces.source.path)/repo/$(params.context_dir)" \
          --local dockerfile="$(workspaces.source.path)/repo/$(params.context_dir)" \
          --output "type=image,name=$(params.image),push=true"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fastapi-demo-ci
  namespace: ci
spec:
  params:
    - name: repo_url
      type: string
    - name: git_ref
      type: string
    - name: commit_sha
      type: string
    - name: image_repository
      type: string
      default: ghcr.io/re1lya/fastapi-demo
    - name: context_dir
      type: string
      default: crossplane-backstage-poc/apps/fastapi-demo
  workspaces:
    - name: source
    - name: dockerconfig
  tasks:
    - name: clone
      taskRef:
        name: clone-repo
      workspaces:
        - name: source
          workspace: source
      params:
        - name: repo_url
          value: $(params.repo_url)
        - name: git_ref
          value: $(params.git_ref)
    - name: test
      runAfter:
        - clone
      taskRef:
        name: test-fastapi-demo
      workspaces:
        - name: source
          workspace: source
      params:
        - name: context_dir
          value: $(params.context_dir)
    - name: build-push
      runAfter:
        - test
      taskRef:
        name: build-push-fastapi-demo
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
      params:
        - name: context_dir
          value: $(params.context_dir)
        - name: image
          value: $(params.image_repository):$(params.commit_sha)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: fastapi-demo-ci-binding
  namespace: ci
spec:
  params:
    - name: repo_url
      value: $(body.repository.clone_url)
    - name: git_ref
      value: $(body.after)
    - name: commit_sha
      value: $(body.after)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: fastapi-demo-ci-template
  namespace: ci
spec:
  params:
    - name: repo_url
    - name: git_ref
    - name: commit_sha
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: fastapi-demo-ci-
        namespace: ci
      spec:
        pipelineRef:
          name: fastapi-demo-ci
        params:
          - name: repo_url
            value: $(tt.params.repo_url)
          - name: git_ref
            value: $(tt.params.git_ref)
          - name: commit_sha
            value: $(tt.params.commit_sha)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: dockerconfig
            secret:
              secretName: ghcr-auth
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: fastapi-demo-ci-listener
  namespace: ci
spec:
  serviceAccountName: fastapi-demo-ci
  triggers:
    - name: github-push
      interceptors:
        - ref:
            name: github
            kind: ClusterInterceptor
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secretToken
            - name: eventTypes
              value:
                - push
      bindings:
        - ref: fastapi-demo-ci-binding
      template:
        ref: fastapi-demo-ci-template
