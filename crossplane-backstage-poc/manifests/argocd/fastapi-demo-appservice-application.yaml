apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-demo-appservice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://helm-repo.platform-system.svc.cluster.local
    chart: fastapi-demo-appservice
    targetRevision: 0.1.*
    helm:
      releaseName: fastapi-demo-appservice
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
