apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-appservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Re1lya/Markdown.git
    path: crossplane-backstage-poc/gitops/argocd
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
